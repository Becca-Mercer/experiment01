name: "My Composit Action"
description: "A reusable composit action that checks out code and sets up Node.js"

inputs: 
  node-version: 
    description: "The Node.js version to use"
    required: true

runs:
  using: "composite"
  steps:

    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: set up Node.js 
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version}}

    - id: run-script 
      run: echo "results= Success" >> $GITHUB_OUTPUT
      shell: bash